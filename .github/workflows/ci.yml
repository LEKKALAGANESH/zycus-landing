name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-lint-and-test:
    name: PHP lint & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo, pdo_mysql, zip
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: PHP syntax check (php -l) on all PHP files
        run: find . -type f -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

      - name: Run PHPUnit
        if: ${{ hashFiles('phpunit.xml.dist') != '' }}
        run: vendor/bin/phpunit --testdox

  js-syntax-check:
    name: JS syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: node --check on all JS assets
        run: |
          shopt -s nullglob
          files=(public/assets/js/*.js)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No JS files found under public/assets/js/"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Checking $f"
            node --check "$f"
          done
        shell: bash
