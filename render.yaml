services:
  - type: web
    name: zycus-landing
    runtime: docker
    region: singapore          # pick the region closest to your users
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false            # set in Render dashboard after the service gets its URL
      - key: APP_CALENDLY_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_TIMEOUT
        value: "5"
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM_EMAIL
        sync: false
      - key: MAIL_FROM_NAME
        value: Zycus Landing
      - key: MAIL_TO_EMAIL
        sync: false
      - key: GTM_CONTAINER_ID
        value: GTM-KG8889HK
      - key: GA4_MEASUREMENT_ID
        value: G-1MG1YKNRDF
