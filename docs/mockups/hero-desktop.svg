<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Zycus hero wireframe - desktop 1200x600</title>
  <desc id="d">Low-fidelity SVG wireframe of the Zycus landing page hero at the desktop breakpoint.</desc>
  <rect width="1200" height="600" fill="#FAFBFD"/>
  <!-- Header -->
  <g>
    <rect x="20" y="20" width="44" height="44" rx="10" fill="#0F3D81"/>
    <text x="42" y="51" font-family="sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">Z</text>
    <text x="540" y="48" font-family="sans-serif" font-size="14" fill="#0F3D81">How it works</text>
    <text x="680" y="48" font-family="sans-serif" font-size="14" fill="#4A5B7A">·</text>
    <text x="720" y="48" font-family="sans-serif" font-size="14" fill="#0F3D81">Customers</text>
    <text x="830" y="48" font-family="sans-serif" font-size="14" fill="#4A5B7A">·</text>
    <text x="860" y="48" font-family="sans-serif" font-size="14" fill="#0F3D81">FAQ</text>
    <rect x="1020" y="26" width="160" height="36" rx="18" fill="#FF1446"/>
    <text x="1100" y="49" font-family="sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Book My Demo</text>
  </g>
  <!-- Divider -->
  <line x1="20" y1="88" x2="1180" y2="88" stroke="#40A4FB" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Left column: hero content -->
  <g>
    <text x="60" y="150" font-family="sans-serif" font-size="13" font-weight="700" fill="#40A4FB" letter-spacing="2">AGENTIC AI FOR SOURCE-TO-PAY</text>
    <text x="60" y="210" font-family="sans-serif" font-size="40" font-weight="700" fill="#0F3D81">Cut Procurement Costs</text>
    <text x="60" y="258" font-family="sans-serif" font-size="40" font-weight="700" fill="#0F3D81">by 40% with Agentic AI</text>
    <text x="60" y="310" font-family="sans-serif" font-size="16" fill="#4A5B7A">Zycus Merlin AI automates sourcing, contracting,</text>
    <text x="60" y="334" font-family="sans-serif" font-size="16" fill="#4A5B7A">and invoice processing end-to-end.</text>
    <text x="60" y="358" font-family="sans-serif" font-size="16" fill="#4A5B7A">Trusted by 1,200+ enterprises worldwide.</text>
    <!-- CTA -->
    <rect x="60" y="390" width="160" height="44" rx="22" fill="#FF1446"/>
    <text x="140" y="418" font-family="sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Book My Demo</text>
    <!-- Trust badges -->
    <text x="60" y="470" font-family="sans-serif" font-size="13" font-weight="700" fill="#40A4FB">✓</text>
    <text x="78" y="470" font-family="sans-serif" font-size="13" fill="#4A5B7A">SOC 2 Type II &amp; ISO 27001 certified</text>
    <text x="60" y="494" font-family="sans-serif" font-size="13" font-weight="700" fill="#40A4FB">✓</text>
    <text x="78" y="494" font-family="sans-serif" font-size="13" fill="#4A5B7A">Deploys in under 8 weeks, not 8 months</text>
    <text x="60" y="518" font-family="sans-serif" font-size="13" font-weight="700" fill="#40A4FB">✓</text>
    <text x="78" y="518" font-family="sans-serif" font-size="13" fill="#4A5B7A">Gartner Magic Quadrant Leader, 2024</text>
  </g>
  <!-- Right column: brain logo placeholder -->
  <g>
    <rect x="720" y="130" width="420" height="380" rx="16" fill="#FFFFFF" stroke="#40A4FB" stroke-opacity="0.35" stroke-width="1"/>
    <circle cx="930" cy="300" r="90" fill="none" stroke="#40A4FB" stroke-opacity="0.45" stroke-width="1.5"/>
    <circle cx="930" cy="300" r="55" fill="none" stroke="#0F3D81" stroke-opacity="0.35" stroke-width="1"/>
    <text x="930" y="440" font-family="sans-serif" font-size="14" fill="#4A5B7A" text-anchor="middle">Brain logo</text>
  </g>
  <!-- Footer strip -->
  <line x1="20" y1="570" x2="1180" y2="570" stroke="#40A4FB" stroke-opacity="0.2" stroke-width="1"/>
  <text x="60" y="590" font-family="sans-serif" font-size="11" fill="#4A5B7A">Wireframe · desktop 1200 × 600</text>
</svg>
