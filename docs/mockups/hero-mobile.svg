<svg xmlns="http://www.w3.org/2000/svg" width="375" height="600" viewBox="0 0 375 600" role="img" aria-labelledby="t d">
  <title id="t">Zycus hero wireframe - mobile 375x600</title>
  <desc id="d">Low-fidelity SVG wireframe of the Zycus landing page hero at the mobile breakpoint.</desc>
  <rect width="375" height="600" fill="#FAFBFD"/>
  <!-- Header -->
  <g>
    <rect x="20" y="20" width="44" height="44" rx="10" fill="#0F3D81"/>
    <text x="42" y="51" font-family="sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">Z</text>
    <!-- Hamburger -->
    <line x1="315" y1="32" x2="349" y2="32" stroke="#0F3D81" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="315" y1="42" x2="349" y2="42" stroke="#0F3D81" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="315" y1="52" x2="349" y2="52" stroke="#0F3D81" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <line x1="20" y1="88" x2="355" y2="88" stroke="#40A4FB" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Hero content, single column -->
  <g>
    <text x="20" y="130" font-family="sans-serif" font-size="11" font-weight="700" fill="#40A4FB" letter-spacing="1.6">AGENTIC AI FOR SOURCE-TO-PAY</text>
    <text x="20" y="174" font-family="sans-serif" font-size="28" font-weight="700" fill="#0F3D81">Cut Procurement</text>
    <text x="20" y="208" font-family="sans-serif" font-size="28" font-weight="700" fill="#0F3D81">Costs by 40%</text>
    <text x="20" y="242" font-family="sans-serif" font-size="28" font-weight="700" fill="#0F3D81">with Agentic AI</text>
    <text x="20" y="282" font-family="sans-serif" font-size="14" fill="#4A5B7A">Zycus Merlin AI automates sourcing,</text>
    <text x="20" y="302" font-family="sans-serif" font-size="14" fill="#4A5B7A">contracting, and invoice processing.</text>
    <text x="20" y="322" font-family="sans-serif" font-size="14" fill="#4A5B7A">Trusted by 1,200+ enterprises worldwide.</text>
    <rect x="20" y="348" width="160" height="44" rx="22" fill="#FF1446"/>
    <text x="100" y="376" font-family="sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Book My Demo</text>
    <text x="20" y="428" font-family="sans-serif" font-size="12" font-weight="700" fill="#40A4FB">✓</text>
    <text x="38" y="428" font-family="sans-serif" font-size="12" fill="#4A5B7A">SOC 2 Type II &amp; ISO 27001 certified</text>
    <text x="20" y="450" font-family="sans-serif" font-size="12" font-weight="700" fill="#40A4FB">✓</text>
    <text x="38" y="450" font-family="sans-serif" font-size="12" fill="#4A5B7A">Deploys in under 8 weeks</text>
    <text x="20" y="472" font-family="sans-serif" font-size="12" font-weight="700" fill="#40A4FB">✓</text>
    <text x="38" y="472" font-family="sans-serif" font-size="12" fill="#4A5B7A">Gartner Magic Quadrant Leader, 2024</text>
  </g>
  <line x1="20" y1="570" x2="355" y2="570" stroke="#40A4FB" stroke-opacity="0.2" stroke-width="1"/>
  <text x="20" y="590" font-family="sans-serif" font-size="11" fill="#4A5B7A">Wireframe · mobile 375 × 600</text>
</svg>
